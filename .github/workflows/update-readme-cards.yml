name: Update README cards

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-cards:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Generate profile stats
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=DaosPath&show_icons=true&theme=tokyonight&hide_border=true&include_all_commits=true&rank_icon=github&locale=es
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=DaosPath&layout=compact&theme=tokyonight&hide_border=true&langs_count=8&locale=es
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Cic pin
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: username=DaosPath&repo=Cic&theme=tokyonight&hide_border=true&locale=es
          path: profile/cic.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit generated cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "chore: update README cards" || exit 0
          git push
