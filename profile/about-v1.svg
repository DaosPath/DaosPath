  <text x="54" y="160" fill="#d8def8" font-family="Segoe UI, Ubuntu, sans-serif" font-size="12">HTML, CSS, JS, TS y React.</text>
  <rect x="258" y="106" width="204" height="72" rx="14" fill="#20263a" opacity="0.78"/>
