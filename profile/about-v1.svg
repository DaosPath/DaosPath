<svg xmlns="http://www.w3.org/2000/svg" width="920" height="220" viewBox="0 0 920 220" role="img" aria-label="Sobre mi">
  <rect width="920" height="220" rx="18" fill="#111827"/>
  <rect x="1.5" y="1.5" width="917" height="217" rx="17.5" fill="none" stroke="#36405f"/>
